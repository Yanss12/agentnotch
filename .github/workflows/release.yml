name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Each runner builds its own platform's targets (linux: AppImage+deb,
      # windows: nsis, mac: dmg+zip) and uploads them to the tag's release.
      - run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No Apple certs — build unsigned instead of failing.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
